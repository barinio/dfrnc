<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Gradient Background - Black Iridescent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="gradient-canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('gradient-canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

        if (!gl) {
            alert('WebGL not supported');
        }

        // Vertex shader - just covers the screen
        const vertexShaderSource = `
            attribute vec2 position;
            void main() {
                gl_Position = vec4(position, 0.0, 1.0);
            }
        `;

        // Fragment shader - creates the animated gradient
        const fragmentShaderSource = `
            precision mediump float;
            uniform vec2 resolution;
            uniform float time;

            // Simple noise function for film grain
            float noise(vec2 p) {
                return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
            }

            // Smoother noise for iridescent specks
            float smoothNoise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                
                float a = noise(i);
                float b = noise(i + vec2(1.0, 0.0));
                float c = noise(i + vec2(0.0, 1.0));
                float d = noise(i + vec2(1.0, 1.0));
                
                return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
            }

            // HSV to RGB conversion for iridescent colors
            vec3 hsv2rgb(vec3 c) {
                vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
                vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
            }

            void main() {
                vec2 uv = gl_FragCoord.xy / resolution.xy;
                vec2 pos = uv * 2.0 - 1.0;
                pos.x *= resolution.x / resolution.y;

                // Create 4 slowly moving dark gradient spots (shades of black/gray with color tints)
                vec3 color = vec3(0.0);
                
                // Spot 1 - very dark gray with blue tint (increased brightness)
                vec2 spot1 = vec2(
                    sin(time * 0.15) * 1.3,
                    cos(time * 0.12) * 1.2
                );
                float dist1 = length(pos - spot1);
                vec3 color1 = vec3(0.064, 0.075, 0.107); // 7% brighter
                color += color1 * (1.0 - smoothstep(0.0, 1.5, dist1));

                // Spot 2 - slightly lighter gray with violet tint (increased brightness)
                vec2 spot2 = vec2(
                    cos(time * 0.13 + 4.5) * 1.4,
                    sin(time * 0.16 + 1.2) * 1.1
                );
                float dist2 = length(pos - spot2);
                vec3 color2 = vec3(0.107, 0.086, 0.128); // 7% brighter
                color += color2 * (1.0 - smoothstep(0.0, 1.6, dist2));

                // Spot 3 - darker gray with red tint (increased brightness)
                vec2 spot3 = vec2(
                    sin(time * 0.11 + 3.14) * 1.2,
                    cos(time * 0.14 + 5.5) * 1.3
                );
                float dist3 = length(pos - spot3);
                vec3 color3 = vec3(0.064, 0.043, 0.054); // 7% brighter
                color += color3 * (1.0 - smoothstep(0.0, 1.4, dist3));

                // Spot 4 - medium gray with cyan tint (increased brightness)
                vec2 spot4 = vec2(
                    cos(time * 0.17 + 2.5) * 1.1,
                    sin(time * 0.10 + 4.0) * 1.4
                );
                float dist4 = length(pos - spot4);
                vec3 color4 = vec3(0.086, 0.118, 0.128); // 7% brighter
                color += color4 * (1.0 - smoothstep(0.0, 1.7, dist4));

                // Film grain - back to original intensity
                float grainSize = max(resolution.x, resolution.y) / 62.5; // Enlarged by 1.6x
                vec2 grainUV = gl_FragCoord.xy / grainSize;
                float grain = noise(grainUV + time * 0.05); // Slowed by 50%
                grain = (grain - 0.5) * 0.15; // Reduced grain intensity
                color += vec3(grain);

                // Tiny iridescent specks at grain-size scale with low distribution
                // Use same grain resolution for speck size
                float speckNoise = noise(grainUV + time * 0.2); // Adjusted speed
                
                // Increased distribution - ~8% of grains get color
                if (speckNoise > 0.92) {
                    // Generate iridescent hue - avoiding greens (0.25-0.5 range)
                    // Map to blue/violet/red: 0.5-1.0 (cyan->blue->magenta->red)
                    float hueNoise = fract(noise(grainUV * 2.0) + time * 0.05);
                    float hue = mix(0.5, 1.0, hueNoise); // Range: cyan to red, skipping green/yellow
                    float saturation = 1.0; // Maximum saturation for vivid colors
                    float brightness = (speckNoise - 0.92) * 10.0; // Bright little sparks
                    
                    vec3 iridescentColor = hsv2rgb(vec3(hue, saturation, brightness));
                    color += iridescentColor * 0.5;
                }

                // Adjust for 7% brighter and 5% more contrast
                // First apply contrast: move away from mid-gray (0.5)
                vec3 contrasted = (color - 0.5) * 1.05 + 0.5;
                
                // Then apply brightness increase
                vec3 finalColor = contrasted / 2.0 + vec3(0.0107, 0.0107, 0.0107); // Base brightness increased by 7%
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Program link error:', gl.getProgramInfoLog(program));
        }

        gl.useProgram(program);

        // Create a rectangle that covers the screen
        const positions = new Float32Array([
            -1, -1,
             1, -1,
            -1,  1,
             1,  1,
        ]);

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

        const positionLocation = gl.getAttribLocation(program, 'position');
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        const resolutionLocation = gl.getUniformLocation(program, 'resolution');
        const timeLocation = gl.getUniformLocation(program, 'time');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
        }

        window.addEventListener('resize', resize);
        resize();

        let startTime = Date.now();

        function render() {
            const currentTime = (Date.now() - startTime) / 1000;
            gl.uniform1f(timeLocation, currentTime);
            
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            
            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
