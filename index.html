<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <link rel="icon" href="./public/favicon.ico" />
        <title>DFRNC</title>
        <!-- Warm the FIRST frame of the scrubbed clip during HTML parse so the
             intro loader can release as soon as it decodes (the rest of the
             sequence streams in over the ~440vh runway before the reveal at
             sp=0.63). Media-scoped to match frames.ts's tier breakpoint (≤899.98px
             → 1280px tier, else 1920px) so the preload is reused, not double-
             fetched. fetchpriority=low yields to the JS/loader assets. -->
        <link rel="preload" as="image" href="./frames/1280/0001.webp" type="image/webp" media="(max-width: 899.98px)" fetchpriority="low" />
        <link rel="preload" as="image" href="./frames/1920/0001.webp" type="image/webp" media="(min-width: 900px)" fetchpriority="low" />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
